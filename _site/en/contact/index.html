    <main>
        <div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <h1 class="display-5 fw-bold mb-4">Contact</h1>
            <form action="https://formsubmit.co/contact@myclubshot.de" method="POST" id="contactForm">
                <input type="hidden" name="_subject" value="New Contact Request">
                
                <div class="mb-3">
                    <label for="subject" class="form-label">Subject *</label>
                    <select class="form-select" id="subject" name="subject" required>
                        <option value="Angebot anfragen">Angebot anfragen</option>
                        <option value="Rückruf">Rückruf</option>
                        <option value="Allgemeine Frage">Allgemeine Frage</option>
                    </select>
                </div>
                
                <div class="mb-3">
                    <label for="name" class="form-label">Name *</label>
                    <input type="text" class="form-control" id="name" name="name" required>
                </div>
                
                <div class="mb-3">
                    <label for="email" class="form-label">Email *</label>
                    <input type="email" class="form-control" id="email" name="email" required>
                </div>
                
                <div class="mb-3">
                    <label for="phone" class="form-label">Phone number (mandatory for callback)</label>
                    <input type="tel" class="form-control" id="phone" name="phone">
                </div>
                
                <div class="mb-4">
                    <label for="message" class="form-label">Message *</label>
                    <textarea class="form-control" id="message" name="message" rows="5" required></textarea>
                </div>
                
                <button type="submit" class="btn btn-primary btn-lg rounded-pill px-5">Send message</button>
            </form>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const subjectSelect = document.getElementById('subject');
        const phoneInput = document.getElementById('phone');
        
        function updatePhoneRequirement() {
            if (subjectSelect.value === 'Rückruf') {
                phoneInput.required = true;
            } else {
                phoneInput.required = false;
            }
        }
        
        subjectSelect.addEventListener('change', updatePhoneRequirement);
        updatePhoneRequirement();
    });
</script>
